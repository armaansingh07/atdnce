<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | JNTU Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #0b0e14; scroll-behavior: smooth; }
        .glass-card { background: rgba(22, 27, 34, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .reveal { opacity: 0; transform: translateY(30px); transition: 1s all ease; }
        .reveal.active { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body class="text-slate-200">

    <div class="max-w-6xl mx-auto p-6 md:p-12">
        <nav class="sticky top-6 z-50 glass-card px-8 py-4 rounded-3xl flex justify-between items-center mb-12 shadow-2xl">
            <h2 class="font-black text-xl tracking-tighter">JSYNC <span class="text-cyan-500">.</span></h2>
            <div class="flex gap-6 items-center">
                <a href="about.html" class="text-[10px] font-bold uppercase tracking-widest text-slate-400 hover:text-white">About</a>
                <a href="contact.html" class="text-[10px] font-bold uppercase tracking-widest text-slate-400 hover:text-white">Contact</a>
                <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-cyan-500 to-blue-500 border border-white/20"></div>
            </div>
        </nav>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-12">
            <div class="glass-card p-8 rounded-[2.5rem] reveal active">
                <p class="text-xs font-black text-slate-500 uppercase tracking-[0.2em] mb-6">Attendance Trends</p>
                <canvas id="attendanceChart" height="200"></canvas>
            </div>

            <div class="grid grid-cols-2 gap-4 reveal active">
                <div class="glass-card p-6 rounded-[2rem] flex flex-col justify-center">
                    <p class="text-slate-500 text-[10px] font-black uppercase mb-2">Total Score</p>
                    <h3 class="text-5xl font-black text-white italic">82%</h3>
                </div>
                <div class="glass-card p-6 rounded-[2rem] flex flex-col justify-center">
                    <p class="text-slate-500 text-[10px] font-black uppercase mb-2">Streak</p>
                    <h3 class="text-5xl font-black text-cyan-400 italic">14<span class="text-sm">days</span></h3>
                </div>
                <div class="glass-card p-6 rounded-[2rem] flex flex-col justify-center border-l-4 border-l-green-500/50">
                    <p class="text-slate-500 text-[10px] font-black uppercase mb-2 text-green-500">Present</p>
                    <h3 class="text-3xl font-black text-white">124</h3>
                </div>
                <div class="glass-card p-6 rounded-[2rem] flex flex-col justify-center border-l-4 border-l-red-500/50">
                    <p class="text-slate-500 text-[10px] font-black uppercase mb-2 text-red-500">Absent</p>
                    <h3 class="text-3xl font-black text-white">12</h3>
                </div>
            </div>
        </div>

        <div class="glass-card p-12 md:p-20 rounded-[3.5rem] text-center reveal">
            <div class="inline-block px-4 py-1 rounded-full bg-cyan-500/10 text-cyan-400 text-[10px] font-black uppercase tracking-widest mb-6">Device Verified</div>
            <h2 class="text-4xl md:text-6xl font-black text-white tracking-tighter mb-8 italic">Ready to Check-in?</h2>
            <button onclick="markAttendance(this)" class="bg-white text-black font-black px-16 py-6 rounded-2xl hover:bg-cyan-400 transition-all duration-500 shadow-[0_0_30px_rgba(255,255,255,0.1)] hover:shadow-cyan-500/40 transform hover:scale-105">
                VERIFY & SYNC
            </button>
        </div>
    </div>

    <script>
        // Chart Logic
        const ctx = document.getElementById('attendanceChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'],
                datasets: [{
                    label: 'Attendance Rate',
                    data: [75, 82, 80, 85, 82, 88],
                    borderColor: '#06b6d4',
                    backgroundColor: 'rgba(6, 182, 212, 0.1)',
                    fill: true,
                    tension: 0.4,
                    borderWidth: 4,
                    pointRadius: 0
                }]
            },
            options: {
                plugins: { legend: { display: false } },
                scales: {
                    x: { grid: { display: false }, ticks: { color: '#475569' } },
                    y: { display: false }
                }
            }
        });

        // Scroll Reveal Logic
        function reveal() {
            var reveals = document.querySelectorAll(".reveal");
            for (var i = 0; i < reveals.length; i++) {
                var windowHeight = window.innerHeight;
                var elementTop = reveals[i].getBoundingClientRect().top;
                if (elementTop < windowHeight - 100) {
                    reveals[i].classList.add("active");
                }
            }
        }
        window.addEventListener("scroll", reveal);

        // Interaction
        function markAttendance(btn) {
            btn.innerHTML = "LOCATING...";
            btn.style.backgroundColor = "#334155";
            btn.style.color = "white";
            setTimeout(() => {
                btn.innerHTML = "SYNC SUCCESSFUL";
                btn.style.backgroundColor = "#22c55e";
            }, 2000);
        }
    </script>
</body>
</html>
