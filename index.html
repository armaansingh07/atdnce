<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | JNTU Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: radial-gradient(circle at top right, #1e293b, #0b0e14); }
        .liquid-glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6 overflow-hidden">
    <div class="liquid-glass p-10 rounded-[2.5rem] w-full max-w-md shadow-[0_20px_50px_rgba(0,0,0,0.5)] transition-all duration-700 transform hover:scale-[1.01]">
        <div class="w-16 h-1 w-16 bg-cyan-500 rounded-full mx-auto mb-8 blur-[1px] shadow-[0_0_15px_rgba(6,182,212,0.5)]"></div>
        <h1 class="text-4xl font-black text-white text-center tracking-tighter mb-2">JNTU <span class="text-cyan-400">SYNC</span></h1>
        <p class="text-slate-500 text-center text-xs font-bold tracking-[0.3em] uppercase mb-10">Intelligence System</p>
        
        <form onsubmit="event.preventDefault(); document.body.style.opacity='0'; setTimeout(()=>window.location.href='dashboard.html', 500)" class="space-y-6">
            <input type="text" placeholder="Username" class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-5 text-white placeholder:text-slate-600 focus:bg-white/10 outline-none transition-all focus:ring-2 ring-cyan-500/20" required>
            <input type="password" placeholder="Password" class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-5 text-white placeholder:text-slate-600 focus:bg-white/10 outline-none transition-all focus:ring-2 ring-cyan-500/20" required>
            <button class="w-full bg-white text-black font-black py-4 rounded-2xl hover:bg-cyan-400 transition-all duration-300 shadow-xl active:scale-95">ENTER PORTAL</button>
        </form>

        <div class="mt-10 flex justify-center gap-8 text-[10px] font-black text-slate-500 uppercase tracking-widest">
            <a href="about.html" class="hover:text-white transition-colors">About</a>
            <a href="contact.html" class="hover:text-white transition-colors">Contact</a>
        </div>
    </div>
</body>
</html>
