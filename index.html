<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - JNTU Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0b0e14] flex items-center justify-center min-h-screen p-4">
    <div class="bg-[#161b22] p-8 rounded-[2rem] border border-slate-800 w-full max-w-md shadow-2xl text-center">
        <h1 class="text-3xl font-black text-cyan-400 mb-2">JNTU <span class="text-white">SYNC</span></h1>
        <p class="text-slate-500 text-sm mb-8 font-bold uppercase tracking-widest">Portal Access</p>
        
        <form onsubmit="event.preventDefault(); window.location.href='dashboard.html'" class="space-y-4 text-left">
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-2 ml-1 uppercase">Username</label>
                <input type="text" placeholder="armaan_07" class="w-full bg-[#0b0e14] border border-slate-800 rounded-xl py-3 px-4 text-white focus:border-cyan-500 outline-none transition-all" required>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-2 ml-1 uppercase">Password</label>
                <input type="password" placeholder="••••••••" class="w-full bg-[#0b0e14] border border-slate-800 rounded-xl py-3 px-4 text-white focus:border-cyan-500 outline-none transition-all" required>
            </div>
            
            <button type="submit" class="w-full bg-cyan-500 hover:bg-cyan-400 text-black font-black py-4 rounded-xl mt-4 transition-all transform active:scale-95 shadow-lg shadow-cyan-500/20">
                SIGN IN
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-slate-800 flex justify-center gap-6 text-[10px] font-bold text-slate-500 uppercase">
            <a href="about.html" class="hover:text-cyan-400 transition-colors">About</a>
            <a href="contact.html" class="hover:text-cyan-400 transition-colors">Contact</a>
        </div>
    </div>
</body>
</html>
