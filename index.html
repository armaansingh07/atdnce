<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | JNTU Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: radial-gradient(circle at top right, #1e293b, #0b0e14); }
        .liquid-glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6 overflow-hidden text-slate-200">
    <div class="liquid-glass p-10 rounded-[2.5rem] w-full max-w-md shadow-[0_20px_50px_rgba(0,0,0,0.5)]">
        <div class="w-16 h-1 bg-cyan-500 rounded-full mx-auto mb-8 shadow-[0_0_15px_rgba(6,182,212,0.5)]"></div>
        <h1 class="text-4xl font-black text-white text-center tracking-tighter mb-2">JNTU <span class="text-cyan-400">SYNC</span></h1>
        <p class="text-slate-500 text-center text-xs font-bold tracking-[0.3em] uppercase mb-10">Student Portal</p>
        
        <form id="loginForm" class="space-y-6">
            <input type="text" id="username" placeholder="Student ID (e.g. armaan07)" class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-5 text-white placeholder:text-slate-600 outline-none focus:ring-2 ring-cyan-500/20" required>
            <input type="password" id="password" placeholder="Password" class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-5 text-white placeholder:text-slate-600 outline-none focus:ring-2 ring-cyan-500/20" required>
            <button type="submit" class="w-full bg-white text-black font-black py-4 rounded-2xl hover:bg-cyan-400 transition-all shadow-xl active:scale-95">LOGIN</button>
        </form>
    </div>

    <script>
        // Bulletproof Login Logic
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault(); // 1. Stop the page from refreshing
            
            const user = document.getElementById('username').value.trim();
            
            if(user) {
                // 2. Save the username to Local Storage (so Dashboard accepts you)
                localStorage.setItem('currentUser', user);
                
                // 3. Send you to the dashboard
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>
</html>
